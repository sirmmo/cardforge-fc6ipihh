    var q = document.getElementById('q');
    q && q.addEventListener('input', function () {
      var v = q.value.trim().toLowerCase();
      document.querySelectorAll('.card').forEach(function (c) {
        c.style.display = (!v || (c.dataset.search || '').indexOf(v) !== -1) ? '' : 'none';
      });
    });
    var lb = document.getElementById('lightbox'), lbs = document.getElementById('lb-scaler'), lbi = document.getElementById('lightbox-inner');
    function closeLb() { lb.style.display = 'none'; lbi.innerHTML = ''; }
    function openLb(fig) {
      var w = +fig.dataset.w, h = +fig.dataset.h;
      var fit = Math.min((window.innerWidth * 0.92) / w, (window.innerHeight * 0.92) / h);
      lbi.innerHTML = fig.querySelector('.fit').innerHTML;
      lbi.style.width = w + 'px'; lbi.style.height = h + 'px'; lbi.style.transform = 'scale(' + fit + ')';
      lbs.style.width = (w * fit) + 'px'; lbs.style.height = (h * fit) + 'px';
      lb.style.display = 'flex';
    }
    document.querySelectorAll('figure.card').forEach(function (fig) {
      fig.addEventListener('click', function () { openLb(fig); });
      fig.addEventListener('keydown', function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openLb(fig); } });
    });
    lb.addEventListener('click', closeLb);
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeLb(); });
